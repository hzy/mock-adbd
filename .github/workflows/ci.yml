name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cpio

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            guest-adbd/target
          key: cargo-${{ hashFiles('guest-adbd/Cargo.lock') }}
          restore-keys: cargo-

      - name: Build
        run: bash scripts/ci-build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mock-adbd
          path: dist/mock-adbd.sh

  test:
    name: Integration Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cpio qemu-system-x86

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            guest-adbd/target
          key: cargo-${{ hashFiles('guest-adbd/Cargo.lock') }}
          restore-keys: cargo-

      - name: Install adb
        run: |
          wget -q https://dl.google.com/android/repository/platform-tools-latest-linux.zip
          unzip -q platform-tools-latest-linux.zip
          echo "$PWD/platform-tools" >> $GITHUB_PATH

      - name: Build
        run: bash scripts/ci-build.sh

      - name: Test
        run: bash tests/integration_test.sh
